<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객 관리 시스템</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
:root {
  --bg:#f4f6fa; --surface:#ffffff; --surface2:#f0f2f7; --border:#dde1ec;
  --accent:#ff6b2b; --text:#1a1d2e; --text2:#6b7280;
  --success:#16a34a; --warn:#d97706; --danger:#dc2626; --rival:#ea580c;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:12px;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.hdr h1{font-size:16px;font-weight:700;} .hdr h1 span{color:var(--accent);}
.hdr-right{display:flex;gap:8px;align-items:center;}

/* SEARCH BAR */
.search-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:10px;align-items:center;}
.search-bar input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-family:inherit;font-size:12px;width:260px;outline:none;}
.search-bar input:focus{border-color:var(--accent);}
.search-bar input::placeholder{color:var(--text2);}
.cnt-badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2);margin-left:auto;}
.cnt-badge b{color:var(--accent);}

/* BTN */
.btn{padding:7px 13px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;} .btn-primary:hover{background:#3d6ce8;}
.btn-success{background:var(--success);color:#fff;} .btn-success:hover{background:#2fc07a;}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border);} .btn-ghost:hover{color:var(--text);border-color:var(--accent);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:4px 9px;font-size:11px;}

/* TABLE WRAPPER */
.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 180px);}
table{width:100%;border-collapse:collapse;table-layout:auto;}

/* STICKY HEADER */
thead th{
  background:#ff6b2b;
  border-bottom:2px solid #e05520;
  border-right:1px solid rgba(255,255,255,0.2);
  padding:0;
  position:sticky;top:0;z-index:100;
  white-space:nowrap;
  user-select:none;
}
thead th:last-child{border-right:none;}

.th-inner{
  display:flex;align-items:center;justify-content:center;
  padding:9px 10px;gap:4px;cursor:pointer;
  font-size:11px;font-weight:700;color:#fff;letter-spacing:0.2px;text-align:center;
}
.th-inner:hover{background:rgba(0,0,0,0.1);}
.cust-resize-handle{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;background:transparent;z-index:10;}
.cust-resize-handle:hover{background:rgba(255,255,255,0.4);}

/* FILTER ARROW BUTTON */
.th-arrow{
  display:flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:4px;
  background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;
  cursor:pointer;font-size:10px;flex-shrink:0;
  transition:all .15s;
}
.th-arrow:hover,.th-arrow.active{background:rgba(255,255,255,0.4);color:#fff;}
.th-arrow.filtered{background:#fff;color:#ff6b2b;border-color:#fff;}

/* SORT INDICATOR */
.th-sort{font-size:9px;color:rgba(255,255,255,0.8);flex-shrink:0;}
.th-sort.asc::after{content:'▲';}
.th-sort.desc::after{content:'▼';}

/* DROPDOWN FILTER */
.col-dropdown{
  position:fixed;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  z-index:500;
  min-width:180px;
  max-width:260px;
  overflow:hidden;
  display:none;
}
.col-dropdown.open{display:block;}
.col-dropdown-search{
  padding:10px;
  border-bottom:1px solid var(--border);
}
.col-dropdown-search input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:6px 10px;color:var(--text);font-family:inherit;font-size:11px;outline:none;
}
.col-dropdown-actions{
  display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border);
}
.col-dropdown-actions button{
  flex:1;padding:4px;background:var(--surface2);border:1px solid var(--border);
  border-radius:5px;color:var(--text2);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;
}
.col-dropdown-actions button:hover{color:var(--accent);border-color:var(--accent);}
.col-dropdown-list{max-height:200px;overflow-y:auto;padding:6px 0;}
.col-dropdown-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;cursor:pointer;transition:background .1s;
  font-size:12px;
}
.col-dropdown-item:hover{background:var(--surface2);}
.col-dropdown-item input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;cursor:pointer;}
.col-dropdown-apply{
  padding:8px 10px;border-top:1px solid var(--border);
}
.col-dropdown-apply button{
  width:100%;padding:7px;background:var(--accent);border:none;border-radius:6px;
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
}
.col-dropdown-apply button:hover{background:#3d6ce8;}

/* TABLE ROWS */
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
tbody tr:hover{background:var(--surface2);}
tbody td{padding:7px 8px;vertical-align:middle;text-align:center !important;border-right:1px solid rgba(46,49,71,0.5);white-space:nowrap;font-size:11px;}
tbody td:last-child{border-right:none;}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;}
.badge-진행중{background:rgba(255,107,43,.15);color:var(--accent);}
.badge-완료{background:rgba(61,214,140,.15);color:var(--success);}
.badge-보류{background:rgba(148,153,176,.15);color:var(--text2);}
.badge-타사완료{background:rgba(255,140,66,.15);color:var(--rival);}
.g1{color:var(--accent);font-weight:700;} .g2{color:var(--warn);font-weight:600;} .g3{color:var(--text2);}
.tag{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;}
.tag-매수{background:rgba(255,107,43,.12);color:#ff6b2b;}
.tag-매도{background:rgba(255,92,92,.12);color:#ff8a8a;}
.tag-전세{background:rgba(61,214,140,.12);color:#5de0a0;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:680px;max-width:100%;}
.modal-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-hdr h2{font-size:14px;font-weight:700;}
.modal-close{background:var(--surface2);border:none;color:var(--text2);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:18px 22px;}
.modal-ftr{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* FORM */
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:10px;font-weight:700;color:var(--text2);}
.fg input,.fg select,.fg textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:inherit;font-size:12px;outline:none;transition:border-color .15s;resize:vertical;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);}
.fg select option{background:var(--surface2);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.full{grid-column:1/-1;}

/* HISTORY */
.hist-section{margin-top:16px;}
.hist-section h3{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.hist-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
.hist-item{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;gap:8px;}
.hist-date{font-size:10px;font-weight:700;color:var(--accent);white-space:nowrap;min-width:65px;}
.hist-txt{font-size:11px;color:var(--text);flex:1;line-height:1.6;}
.hist-del{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:0 2px;}
.hist-del:hover{color:var(--danger);}
.add-hist{display:flex;gap:6px;margin-top:7px;}
.add-hist input[type=date]{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 9px;color:var(--text);font-family:inherit;font-size:11px;outline:none;width:130px;}
.add-hist textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 9px;color:var(--text);font-family:inherit;font-size:11px;outline:none;resize:none;height:54px;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>

    async get(col, id) {
      try {
        const snap = await db.collection(col).doc(String(id)).get();
        if(!snap.exists) return null;
        return {...snap.data(), _id: snap.id};
      } catch(e) { return null; }
    },
    async set(col, id, data) {
      try {
        const clean = JSON.parse(JSON.stringify(data));
        await db.collection(col).doc(String(id)).set(clean, {merge: true});

    },
    async del(col, id) {
      try {
        await db.collection(col).doc(String(id)).delete();
      } catch(e) {}
    },
    listen(col, callback) {
      return db.collection(col).onSnapshot(snap => {
        const data = snap.docs.map(d => ({...d.data(), _id: d.id}));
        callback(data);
      });
    }
  };

  window._FB = _FB;
  window._fbReady = true;

<!-- ── LOGIN SCREEN ── -->
<div id="loginScreen" style="display:none;position:fixed;inset:0;background:linear-gradient(135deg,#fff5f0 0%,#fff 60%,#fff8f4 100%);z-index:9999;align-items:center;justify-content:center;flex-direction:column;">
  <div style="background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(255,107,43,.12);padding:44px 40px 36px;width:340px;max-width:92vw;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:32px;margin-bottom:8px;">🏠</div>
      <div style="font-size:18px;font-weight:800;color:#1a1d2e;">광교이편한세상</div>
      <div style="font-size:13px;color:#6b7280;margin-top:4px;">고객관리 시스템</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <input id="loginId" type="text" placeholder="아이디" autocomplete="username"
        style="padding:12px 14px;border:1.5px solid #dde1ec;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;"
        onfocus="this.style.borderColor='#ff6b2b'" onblur="this.style.borderColor='#dde1ec'">
      <input id="loginPw" type="password" placeholder="비밀번호" autocomplete="current-password"
        style="padding:12px 14px;border:1.5px solid #dde1ec;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;"
        onfocus="this.style.borderColor='#ff6b2b'" onblur="this.style.borderColor='#dde1ec'">
      <div id="loginErr" style="color:#dc2626;font-size:12px;min-height:16px;"></div>
      <button onclick="doLogin()"
        style="padding:13px;background:#ff6b2b;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;"
        onmouseover="this.style.background='#e05520'" onmouseout="this.style.background='#ff6b2b'">
        로그인
      </button>
    </div>
  </div>
</div>

<!-- ── APP SCREEN ── -->
<div id="appScreen" style="display:none;">

<!-- HEADER -->
<div class="hdr">
  <h1>🏠 <span>광교이편한세상</span> 고객관리</h1>
  <div class="hdr-right">
    <span id="userBadge" style="font-size:12px;color:#6b7280;padding:6px 10px;background:#f0f2f7;border-radius:7px;"></span>
    <button id="tabMaemul" class="btn btn-ghost" onclick="switchTab('maemul')">🏠 매물장</button>
    <button id="tabCRM" class="btn btn-ghost" onclick="switchTab('crm')">👥 고객관리</button>
    <button id="tabJournal" class="btn btn-ghost" onclick="switchTab('journal')">📋 업무일지</button>
    <button id="tabAdvert" class="btn btn-ghost" onclick="switchTab('advert')">📢 광고</button>
    <button id="tabReal" class="btn btn-ghost" onclick="switchTab('real')">📈 실거래가</button>
    <!-- 관리자 전용 버튼 (탭별로 switchTab에서 제어) -->
    <button id="excelBtn" class="btn btn-success" onclick="exportCSV()" style="display:none;">📊 엑셀 다운로드</button>
    <button id="dedupeBtn" class="btn btn-ghost" onclick="dedupeDB()" style="display:none;font-size:11px;background:#fff3cd;color:#856404;border:1px solid #ffc107;">🧹 중복정리</button>
    <label id="uploadBtn" class="btn btn-ghost" style="display:none;cursor:pointer;">
      📁 엑셀 업로드
      <input type="file" accept=".xlsx,.xls" style="display:none;" onchange="uploadCRM(this)">
    </label>
    <!-- 매물장 전용 버튼 -->
    <button id="maemulAddBtn" class="btn btn-primary" onclick="openMaemulNew()" style="display:none;">+ 매물 등록</button>
    <button id="maemulLogBtn" class="btn btn-ghost" onclick="openMaemulLog()" style="display:none;background:#fff3ee;color:#ff6b2b;border-color:#ffb899;">📋 변경 로그</button>
    <button id="maemulExcelBtn" class="btn btn-success" onclick="exportMaemulExcel()" style="display:none;">📊 엑셀 다운로드</button>
    <label id="maemulUploadBtn" class="btn btn-ghost" style="display:none;cursor:pointer;">
      📁 엑셀 업로드
      <input type="file" accept=".xlsx,.xls" style="display:none;" onchange="uploadMaemul(this)">
    </label>
    <button id="maemulDedupeBtn" class="btn btn-ghost" onclick="dedupeMaemulOnly()" style="display:none;font-size:11px;background:#fff3cd;color:#856404;border:1px solid #ffc107;">🧹 중복정리</button>
    <!-- 업무일지 전용 버튼 -->
    <button id="journalAddBtn" class="btn btn-primary" onclick="openAddJournal()" style="display:none;">+ 업무 추가</button>
    <button id="journalExcelBtn" class="btn btn-success" onclick="exportJournalExcel()" style="display:none;">📊 엑셀 다운로드</button>
    <button id="journalDedupeBtn" class="btn btn-ghost" onclick="dedupeJournal()" style="display:none;font-size:11px;background:#fff3cd;color:#856404;border:1px solid #ffc107;">🧹 중복정리</button>
    <label id="journalUploadBtn" class="btn btn-ghost" style="display:none;cursor:pointer;">
      📁 엑셀 업로드
      <input type="file" accept=".xlsx,.xls" style="display:none;" onchange="uploadJournal(this)">
    </label>
    <!-- 공통 버튼 -->
    <button class="btn btn-primary" id="addClientBtn" onclick="openNew()" style="display:none;">+ 고객 등록</button>
    <button class="btn btn-ghost" onclick="toggleBlind()" style="font-size:11px;display:none;" id="blindBtn" title="상담 모드">👁 상담 모드</button>
    <button class="btn btn-ghost" onclick="doLogout()" style="font-size:11px;">로그아웃</button>
  </div>
</div>

    {id:62,date:'2025-12-20',grade:'1',status:'진행중',name:'영통 부부-대림/자이',phone:'010-5755-4926',gubun:'매수',type:'아파트',manager:'강일임',lastCall:'2025-12-24',note:'자이1단지 17억대랑 대림 보실려고 일정잡아 오심.영통에 37평 방4개 3층 거주중이신데 아직 매매가 안되고 있다고 하시고 자금은 17억대까지인거 같으시고 6122-1002,6119-202,6107-204보셨고 6119-202를 맘에 들어하심. 보시고 자이 1단지 보고 오후에 1시까지 일보러 가셔야 돼서 일정 바빠  영디자인 집은 다음주 평일에 일정 잡아 보기로 함.대림단지 로얄동 물어보셔서 9,10,11,12동 //1,2,19,21동 순으로 말씀드림.부부 두 분다 47평 보다는 39평을 좋아하시는 것 같고 47평은 넓은데 해가 잘 안들거 같고 자녀방은 도로가 다 보이고 해서 커텐 안치고는 안돼 보인다고 하심.',history:[{d:'2025-12-23',c:'1단지 자이 매가 17억도 보고 맘에 들었는데 일단은 영통 본인집이 매도가 되어야 하는데 안되서 못하는 상황임.'}]},

    {id:126,date:'2026-04-22',grade:'3',status:'진행중',name:'상현동 거주/여',phone:'010-4438-2203',gubun:'매수',type:'아파트',manager:'강일임',lastCall:'2026-05-19',note:'12~1월 입주로 집보고 싶다고 해서 6105-1103,6107-503와 공실6115-402,6116-804 보여줌.괜찮으면 당겨서 입주도 가능하다 하고 남편하고도 궁금한거 없는지 묻고 통화함.',history:[{d:'2026-04-23',c:'남편하고 아직 상의가 안됐고 급하지 않다고 함.'},{d:'2026-05-06',c:'어제 남편하고 대림단지 지나는 길에 둘러봤다고 하심.6101동 매물 찾으셔서 지금은 없고 6109-601말씀드렸더니 남편하고 상의해보신다고 하고 2층 얘기해서 6109-304호도 말씀드림.혹시 6109-202가 나와서 물어볼수도 있음.보지는 않은듯함.'},{d:'2026-05-14',c:'통화 안됐는데 전화주심.1주택 있으시고 대림은 앞동으로만 찾으심.1,9,10,11동 말씀하셔서 6109동2803호 21억에 말씀드림.남편과 상의해보고 통화하기로 함.연락주시기로 한거 아니기 때문에 전화드려야 됨.6109-2803에 대해서 반응은 보이심./처음인거 같음.'},{d:'2026-05-19',c:'저번주 상록자이,경남아너스빌도 보신다고 해서 여쭤봄.상록자이 5,6동 A타입,경남아너스빌 5,6동 A타입 2라인 찾음.상현역777에서 6-1803있다고 해서 브리핑했는데 주인이 매물 거둔다고 해서 4205동 804호 최근 풀인테리어 집 16.5억에 보셨냐고 했더니 기억이 안난다고 해서 인테리어 된집이라 특이하면 기억이 날텐데 라고 하고 안보셨으면 보시자고 했음. 남편과 상의한다.'}]},

    {id:128,date:'2026-05-11',grade:'1',status:'진행중',name:'아이파크매도후 전세',phone:'010-8356-3512',gubun:'전세',type:'아파트',manager:'강일임',lastCall:'2026-05-19',note:'6111-3401봤는데 아이파크 매도후 전세집을 처음봐서 하나만 보고 결정하기가 그렇다고 한발뺌',history:[{d:'2026-05-14',c:'아드님이 중흥은 중흥단지에서 소식 받는거 같고 오늘 대림6117-14층,6101동 브리핑함.풀시에 되어 있는 집이어야 된다고 함.6117동이 주인살아 집도 깨끗하고 커뮤니티 헬스등이 지하로 내려가면 바로 있어 편리하다고 했음.쉬는날 한꺼번에 보신다함. 중흥도 8/10일은 전세 1개임.'},{d:'2026-05-19',c:'이번주 5/23일 아드님과 대림 저번에 못보신 집 보시자고 했음. 사모님은 빨리보고 해야 하는걸 아시는데 아드님이 중흥쪽 부동산에서 5/9일도 지나고 해서 전세 나올수 있다고 기다리라고 했다고 하신다함. 아드님과 상의후 이번주 일정 주시기로 함.깨끗한집 원하심.'}]},

// ── COLUMN FILTER DROPDOWN ──
let ddColKey = null, ddAllVals = [], ddSelected = new Set();

const GRADE_LABEL = {'1':'1 (높음)','2':'2 (보통)','3':'3 (낮음)'};

function getColValues(key) {
  const vals = new Set();
  DB.forEach(r => {
    const v = key === '_hist' ? '' : (r[key] || '');
    if (v !== '') vals.add(String(v));
  });
  return [...vals].sort();
}

function getColDisplayVal(key, v) {
  if (key === 'grade') return GRADE_LABEL[v] || v;
  return v;
}

function openDD(e, colKey) {
  e.stopPropagation();
  ddColKey = colKey;
  ddAllVals = getColValues(colKey);
  ddSelected = colFilters[colKey] ? new Set(colFilters[colKey]) : new Set(ddAllVals);

  document.getElementById('ddSearch').value = '';
  renderDDList(ddAllVals);

  const dd = document.getElementById('colDropdown');
  dd.classList.add('open');

  // Position
  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  const ddW = 220;
  let left = rect.left;
  if (left + ddW > window.innerWidth) left = window.innerWidth - ddW - 8;
  dd.style.left = left + 'px';
  dd.style.top = (rect.bottom + 4) + 'px';
  dd.style.width = ddW + 'px';

  setTimeout(() => document.addEventListener('click', closeDDOutside), 0);
}

function closeDDOutside(e) {
  const dd = document.getElementById('colDropdown');
  if (!dd.contains(e.target)) {
    dd.classList.remove('open');
    document.removeEventListener('click', closeDDOutside);
  }
}

function renderDDList(vals) {
  const q = (document.getElementById('ddSearch').value || '').toLowerCase();
  const filtered = vals.filter(v => getColDisplayVal(ddColKey, v).toLowerCase().includes(q));
  document.getElementById('ddList').innerHTML = filtered.map(v => `
    <label class="col-dropdown-item">
      <input type="checkbox" ${ddSelected.has(v) ? 'checked' : ''} onchange="ddToggle('${esc(v)}', this.checked)">
      <span>${esc(getColDisplayVal(ddColKey, v))}</span>
    </label>
  `).join('');
}

function filterDDList(){ renderDDList(ddAllVals); }
function ddToggle(v, checked){ if(checked) ddSelected.add(v); else ddSelected.delete(v); }
function ddSelectAll(){ ddAllVals.forEach(v=>ddSelected.add(v)); renderDDList(ddAllVals); }
function ddClearAll(){ ddSelected.clear(); renderDDList(ddAllVals); }
function applyDD(){
  const allSelected = ddAllVals.every(v => ddSelected.has(v));
  colFilters[ddColKey] = allSelected ? null : new Set(ddSelected);
  document.getElementById('colDropdown').classList.remove('open');
  document.removeEventListener('click', closeDDOutside);
  buildHeader();
  render();
}

// ── HEADER BUILD ──
// 고객관리 컬럼 너비 저장
function getCustColWidths(){ try{return JSON.parse(localStorage.getItem('custColW')||'{}')}catch(e){return{}} }
function setCustColWidths(w){ try{localStorage.setItem('custColW',JSON.stringify(w))}catch(e){} }

function buildHeader() {
  const tr = document.getElementById('thead-row');
  const savedW = getCustColWidths();
  // colgroup 동적 생성
  let cg = document.querySelector('#mainTable colgroup');
  if(!cg){ cg=document.createElement('colgroup'); document.getElementById('mainTable').prepend(cg); }
  cg.innerHTML = COLS.map(col => {
    const w = savedW[col.key];
    return w ? `<col style="width:${w}px">` : '<col>';
  }).join('');
  tr.innerHTML = COLS.map(col => {
    if (col.key === '_actions') return `<th style="position:sticky;top:0;z-index:100;"><div class="th-inner"><span>${col.label}</span></div><div class="cust-resize-handle" onmousedown="custResizeStart(event,'${col.key}')"></div></th>`;
    if (col.key === '_hist') return `<th style="position:sticky;top:0;z-index:100;"><div class="th-inner"><span>${col.label}</span></div><div class="cust-resize-handle" onmousedown="custResizeStart(event,'${col.key}')"></div></th>`;
    const hasFilter = colFilters[col.key] && colFilters[col.key] !== null;
    const sortIndicator = sortKey === col.key ? `<span class="th-sort ${sortDir>0?'asc':'desc'}"></span>` : '';
    return `<th style="position:sticky;top:0;z-index:100;">
      <div class="th-inner" onclick="setSort('${col.key}')">
        <span>${col.label}</span>
        ${sortIndicator}
        <button class="th-arrow ${hasFilter ? 'filtered' : ''}" onclick="openDD(event,'${col.key}')" title="필터">▼</button>
      </div>
      <div class="cust-resize-handle" onmousedown="custResizeStart(event,'${col.key}')"></div>
    </th>`;
  }).join('');
}

function custResizeStart(e, key){
  e.stopPropagation(); e.preventDefault();
  const th = e.target.closest('th');
  const idx = Array.from(th.parentNode.children).indexOf(th);
  const startX = e.clientX;
  const startW = th.offsetWidth;
  const onMove = ev => {
    const newW = Math.max(40, startW + ev.clientX - startX);
    const cg = document.querySelector('#mainTable colgroup');
    if(cg && cg.children[idx]) cg.children[idx].style.width = newW+'px';
  };
  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    const w = getCustColWidths();
    w[key] = th.offsetWidth;
    setCustColWidths(w);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function custResizeStart(e, key){
  e.stopPropagation(); e.preventDefault();
  const th = e.target.closest('th');
  const startX = e.clientX;
  const startW = th.offsetWidth;
  const onMove = ev => {
    const newW = Math.max(40, startW + ev.clientX - startX);
    th.style.width = newW+'px';
    th.style.minWidth = newW+'px';
  };
  const onUp = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    const w = getCustColWidths();
    w[key] = th.offsetWidth;
    setCustColWidths(w);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ── SORT ──
function setSort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  buildHeader();
  render();
}

// ── RENDER TABLE ──
function render() {
  const q = document.getElementById('searchQ').value.toLowerCase();

  let rows = DB.filter(r => {
    // Column filters
    for (const [k, allowed] of Object.entries(colFilters)) {
      if (!allowed) continue;
      const v = String(r[k] || '');
      if (!allowed.has(v)) return false;
    }
    // Search
    if (q && !r.name.toLowerCase().includes(q) && !r.phone.toLowerCase().includes(q) && !(r.note||'').toLowerCase().includes(q)) return false;
    return true;
  });

  // Sort
  rows.sort((a,b) => {
    const av = String(a[sortKey]||''), bv = String(b[sortKey]||'');
    return av.localeCompare(bv, 'ko') * sortDir;
  });

  document.getElementById('totalCnt').textContent = DB.length;
  document.getElementById('showCnt').textContent = rows.length;
  // 20개씩 페이징
  if(!window._cPage) window._cPage = 0;
  const PAGE = 20;
  const totalPages = Math.ceil(rows.length / PAGE);
  const paged = rows.slice(window._cPage * PAGE, (window._cPage + 1) * PAGE);
  rows = paged;

  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '';
    document.getElementById('emptyMsg').style.display = 'block';
    return;
  }
  document.getElementById('emptyMsg').style.display = 'none';

  // 페이징 버튼 렌더링
  let pagingEl = document.getElementById('crmPaging');
  if(!pagingEl){ pagingEl=document.createElement('div'); pagingEl.id='crmPaging'; pagingEl.style.cssText='display:flex;gap:6px;justify-content:center;padding:12px;flex-wrap:wrap;'; document.getElementById('tblWrap').after(pagingEl); }
  pagingEl.innerHTML = '';
  if(totalPages > 1){
    for(let p=0;p<totalPages;p++){
      const btn=document.createElement('button');
      btn.textContent=p+1;
      btn.className='btn btn-sm '+(p===window._cPage?'btn-primary':'btn-ghost');
      btn.onclick=(()=>{const pp=p;return()=>{window._cPage=pp;render();}})();
      pagingEl.appendChild(btn);
    }
  }

  tbody.innerHTML = rows.map(r => {
    const idx = DB.indexOf(r);
    const lh = r.history && r.history.length ? r.history[r.history.length-1] : null;
    const gubunFirst = r.gubun.split('/')[0];
    return `<tr onclick="openEdit(${idx})" onmouseover="this.style.background='#fff8f5'" onmouseout="this.style.background=''">
      <td style="text-align:center">${fd(r.date)}</td>
      <td style="text-align:center"><span class="g${r.grade}">${r.grade}</span></td>
      <td style="text-align:center"><span class="badge badge-${r.status}">${r.status}</span></td>
      <td style="text-align:center;font-weight:600;">${esc(r.name)}</td>
      <td style="text-align:center">${esc(maskPhone(r.phone, r.manager))}</td>
      <td style="text-align:center"><span class="tag tag-${gubunFirst}">${esc(r.gubun)}</span></td>
      <td style="text-align:center">${esc(r.type)}</td>
      <td style="text-align:center;font-weight:700;color:var(--warn)">${esc(r.manager)}</td>
      <td style="text-align:center">${fd(r.lastCall)}</td>
      <td style="text-align:left;overflow:hidden;text-overflow:ellipsis;max-width:180px;" title="${esc(r.note)}">${esc(r.note)}</td>
      <td style="text-align:left;overflow:hidden;text-overflow:ellipsis;max-width:220px;">${lh?`<span style="color:var(--accent);font-size:10px">${fd(lh.d)}</span> ${esc(lh.c)}`:''}</td>
      <td style="text-align:center" onclick="event.stopPropagation()">
        ${currentUser&&currentUser.manager==='ALL'&&r.updatedBy ? `<div style="font-size:10px;color:#9ca3af;margin-bottom:3px;">${r.updatedBy}·${r.updatedAt||''}</div>` : ''}
        ${(currentUser&&(currentUser.manager==='ALL'||currentUser.manager===r.manager)) ? `
          <button class="btn btn-ghost btn-sm" onclick="openEdit(${idx})">수정</button>
          <button class="btn btn-danger btn-sm" onclick="del(${idx})" style="margin-left:4px">삭제</button>
        ` : `<span style="font-size:10px;color:#9ca3af;">읽기전용</span>`}
      </td>
    </tr>`;
  }).join('');
}

function fd(d){ return d ? d.substring(2).replace(/-/g,'.') : ''; }

function maskPhone(phone) {
  if (!currentUser || currentUser.manager === 'ALL') return phone;
  // 전화번호에서 뒤 3자리 마스킹 (010-1234-5XXX 또는 복수 번호)
  return (phone||'').replace(/(\d{3,4})([\s\-]*)(\d{4})([\s\-]*)(\d{1})(\d{3})/g, '$1$2$3$4$5***');
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 중복 고객 제거 ──
async function dedupeDB(){
  if(!currentUser || currentUser.manager !== 'ALL'){
    alert('관리자만 사용 가능합니다.');
    return;
  }

  // 고객 중복 탐지 (이름+연락처+날짜 기준)
  const seenC = new Map();
  const dupesC = [];
  DB.forEach(r => {
    const key = (r.name||'').trim() + '|' + (r.phone||'').trim() + '|' + (r.date||'').trim();
    if(seenC.has(key)){
      dupesC.push(r.id);
    } else {
      seenC.set(key, r.id);
    }
  });

  // 매물 중복 탐지 (동+호+단지+구분 기준)
  function dedupeMaemulArr(arr){
    const seen = new Map();
    const keep = [];
    arr.forEach((r,i) => {
      const key = (r.danji||'').trim()+'|'+(r.dong||'').trim()+'|'+(r.ho||'').trim()+'|'+(r.gubun||'').trim();
      if(!seen.has(key)){ seen.set(key,i); keep.push(r); }
    });
    return { kept: keep, removed: arr.length - keep.length };
  }
  const r1 = dedupeMaemulArr(window.MP1||[]);
  const r2 = dedupeMaemulArr(window.MP2||[]);
  const r3 = dedupeMaemulArr(window.MP3||[]);
  const totalMaemul = r1.removed + r2.removed + r3.removed;

  const total = dupesC.length + totalMaemul;
  if(total === 0){
    alert('✅ 중복 데이터가 없습니다!');
    return;
  }

  const msg = `중복 데이터가 발견됐습니다!\n\n` +
    `👥 고객: ${dupesC.length}건\n` +
    `🏠 매물(매매1): ${r1.removed}건\n` +
    `🏠 매물(매매2): ${r2.removed}건\n` +
    `🏠 매물(임대): ${r3.removed}건\n\n` +
    `중복 항목을 삭제할까요?`;
  if(!confirm(msg)) return;

  // 고객 중복 제거
  if(dupesC.length > 0){
    DB = DB.filter(r => !dupesC.includes(r.id));
    await saveDB();
    buildHeader(); render();
  }

  // 매물 중복 제거
  if(totalMaemul > 0){
    window.MP1 = r1.kept; MP1 = r1.kept;
    window.MP2 = r2.kept; MP2 = r2.kept;
    window.MP3 = r3.kept; MP3 = r3.kept;
    // 각 탭별로 Firebase에 저장
    if(window._fbReady){
      await _FB.set('maemul_mp1','all',{json:JSON.stringify(MP1)});
      await _FB.set('maemul_mp2','all',{json:JSON.stringify(MP2)});
      await _FB.set('maemul_mp3','all',{json:JSON.stringify(MP3)});
    }
    if(typeof renderMaemul==='function') renderMaemul();
  }

  alert(`✅ 중복 정리 완료!\n고객 ${dupesC.length}건 + 매물 ${totalMaemul}건 삭제`);
}

function exportCSV(){
  if (!currentUser || currentUser.manager !== 'ALL') {
    alert('엑셀 다운로드 권한이 없습니다.');
    return;
  }
  const pw = prompt('엑셀 다운로드를 위해 비밀번호를 다시 입력하세요:');
  const myKey = Object.keys(ACCOUNTS).find(k => ACCOUNTS[k] === currentUser);
  if (!pw || !myKey || pw !== ACCOUNTS[myKey].pw) {
    alert('비밀번호가 올바르지 않습니다.');
    return;
  }
  const headers=['등록일','우선순위','상태','성명','연락처','구분','유형','담당','최근통화','고객 특징','상담이력'];
  let csv='\uFEFF'+headers.join(',')+'\n';
  DB.forEach(r=>{
    const cols=[r.date,r.grade,r.status,r.name,r.phone,r.gubun,r.type,r.manager,r.lastCall,r.note,
      (r.history||[]).map(h=>`[${h.d}] ${h.c}`).join(' | ')];
    csv+=cols.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')+'\n';
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='고객관리_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

// ── 매물장 엑셀 다운로드 ──
function exportMaemulExcel(){
  const tabNames=['매매 이편한·써밋','매매 광교기타','전월세'];
  const data=getMData();
  if(!data.length){alert('다운로드할 데이터가 없습니다.');return;}
  const cols=getMCols();
  const headers=cols.map(c=>c.label);
  let csv='\uFEFF'+headers.join(',')+'\n';
  data.forEach(r=>{
    const row=cols.map(c=>{
      const v=String(r[c.key]||'').replace(/"/g,'""').replace(/\n/g,' ');
      return `"${v}"`;
    });
    csv+=row.join(',')+'\n';
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`매물장_${tabNames[mTab]||mTab}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// ── 매물 전용 중복정리 ──
function dedupeMaemulOnly(){
  function dedup(arr){
    const seen=new Map(), keep=[];
    arr.forEach(r=>{
      const key=(r.danji||'')+'|'+(r.dong||'')+'|'+(r.ho||'')+'|'+(r.gubun||'');
      if(!seen.has(key)){seen.set(key,true);keep.push(r);}
    });
    return {kept:keep, removed:arr.length-keep.length};
  }
  const r1=dedup(window.MP1||[]);
  const r2=dedup(window.MP2||[]);
  const r3=dedup(window.MP3||[]);
  const total=r1.removed+r2.removed+r3.removed;
  if(total===0){alert('✅ 중복 매물이 없습니다!');return;}
  if(!confirm(`중복 매물 ${total}건을 삭제할까요?\n매매1: ${r1.removed}건 / 매매2: ${r2.removed}건 / 전월세: ${r3.removed}건`)) return;
  window.MP1=r1.kept; MP1=r1.kept;
  window.MP2=r2.kept; MP2=r2.kept;
  window.MP3=r3.kept; MP3=r3.kept;
  saveAllMaemulToFirebase();
  renderMaemul();
  alert(`✅ 중복 매물 ${total}건 삭제 완료!`);
}

// ── 업무일지 중복정리 ──
function dedupeJournal(){
  const seen=new Set(), keep=[];
  JDB.forEach(r=>{
    const key=(r.date||'')+'|'+(r.manager||'')+'|'+(r.content||'').trim();
    if(!seen.has(key)){seen.add(key);keep.push(r);}
  });
  const removed=JDB.length-keep.length;
  if(removed===0){alert('✅ 중복 업무일지가 없습니다!');return;}
  if(!confirm(`중복 업무일지 ${removed}건을 삭제할까요?`)) return;
  JDB=keep; window.JDB=keep;
  saveJournal_db();
  renderJournal();
  alert(`✅ 중복 ${removed}건 삭제 완료!`);
}

// 드래그 리사이즈
let mResizing=null;
function startColResize(e, key){
  e.stopPropagation(); e.preventDefault();
  const th=document.getElementById('mth_'+key);
  if(!th) return;
  const startX=e.clientX;
  const startW=th.offsetWidth;
  mResizing={key, startX, startW};

  const onMove=ev=>{
    if(!mResizing) return;
    const newW=Math.max(40, mResizing.startW+(ev.clientX-mResizing.startX));
    const t=document.getElementById('mth_'+mResizing.key);
    if(t){ t.style.minWidth=newW+'px'; t.style.width=newW+'px'; }
  };
  const onUp=ev=>{
    if(!mResizing) return;
    const newW=Math.max(40, mResizing.startW+(ev.clientX-mResizing.startX));
    saveMColWidth(mResizing.key, newW);
    mResizing=null;
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
  };
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

          <input type="checkbox" data-val="${v}" ${selected.has(String(v))||selected.size===0?'checked':''} 
            onchange="toggleDDVal('${key}','${v}',this.checked)" style="accent-color:#ff6b2b;width:14px;height:14px;">
          <span>${v||'(공백)'}</span>
        </label>`).join('')}

      <button onclick="applyFilterDD('${key}')" style="padding:5px 14px;border:none;border-radius:6px;background:#ff6b2b;color:#fff;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700;">확인</button>

function outsideFilterClick(e){
  const dd=document.getElementById('mFilterDD');
  if(dd && !dd.contains(e.target) && !e.target.closest('.m-filter-btn')){
    closeFilterDD();
  }
}

function closeFilterDD(){
  const dd=document.getElementById('mFilterDD');
  if(dd) dd.remove();
  mOpenFilter=null;
  document.removeEventListener('click', outsideFilterClick, true);
}

function filterDDSearch(key){
  const q=(document.getElementById('mFSearchInput')||{}).value?.toLowerCase()||'';
  const items=document.querySelectorAll('#mFDDList label');
  items.forEach(el=>{
    const txt=el.querySelector('span').textContent.toLowerCase();
    el.style.display=txt.includes(q)?'':'none';
  });
}

function toggleDDVal(key, val, checked){
  const dd=document.getElementById('mFilterDD');
  if(!dd) return;
  if(!dd._tempSelected) dd._tempSelected=new Set();
  if(checked) dd._tempSelected.add(val);
  else dd._tempSelected.delete(val);
}

function selectAllDD(key, all){
  const data=getMData();
  const allVals=[...new Set(data.map(r=>(r[key]||'')))].map(String);
  const dd=document.getElementById('mFilterDD');
  if(!dd) return;
  dd._tempSelected = all ? new Set(allVals) : new Set();
  const cbs=dd.querySelectorAll('input[type=checkbox]');
  cbs.forEach(cb=>cb.checked=all);
}

function applyFilterDD(key){
  const dd=document.getElementById('mFilterDD');
  if(!dd) return;
  const data=getMData();
  const allVals=new Set(data.map(r=>String(r[key]||'')));
  const sel=dd._tempSelected||new Set();
  // 전체 선택이면 필터 제거
  if(sel.size===0||sel.size===allVals.size) delete mColFilters[key];
  else mColFilters[key]=sel;
  closeFilterDD();
  renderMaemul();
}

function addMaemulLog(action, tabIdx, rec, memo){
  const now=new Date();
  const dt=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')
    +' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  const who=currentUser?currentUser.name:'?';
  const tabLabel=['매매 이편한·써밋','매매 광교기타','전월세'][tabIdx]||'기타';
  MAEMUL_LOG.unshift({dt,who,action,tabIdx,tabLabel,
    danji:rec.danji||'',dong:rec.dong||'',ho:rec.ho||'',mno:rec._mno||'',memo:memo||''});
  if(MAEMUL_LOG.length>500) MAEMUL_LOG=MAEMUL_LOG.slice(0,500);
  saveMaemulLog();
}

// ── 매물번호 생성 ──
function genMaemulNo(tabIdx, danji){
  const danjiMap={
    '이편한':'이편','써밋':'써밋','래미안':'래미','오드카운티':'오드',
    '자연앤자이3':'자이','힐스테이트':'힐스','중흥S클래스':'중흥','기타':'기타'
  };
  const pre = tabIdx===2 ? '전' : tabIdx===1 ? '기' : '';
  const code = danjiMap[danji]||'기타';
  const tag = pre ? pre+'-'+code : code;
  const all=[...(window.MP1||[]),...(window.MP2||[]),...(window.MP3||[])];
  let maxN=0;
  all.forEach(r=>{
    if((r._mno||'').startsWith(tag+'-')){
      const n=parseInt((r._mno.split('-').pop()||'0'));
      if(!isNaN(n)&&n>maxN) maxN=n;
    }
  });
  return tag+'-'+String(maxN+1).padStart(3,'0');
}

function saveMaemul(){
  const data=getMData(); let obj={};
  const today=new Date().toISOString().split('T')[0];
  const isNew=(mEditIdx===null||mEditIdx<0);
  if(mTab<=1) obj={danji:fv('danji'),priority:fv('priority'),pyung:fv('pyung'),type:fv('type'),dong:fv('dong'),ho:fv('ho'),total:fv('total'),adPrice:fv('adPrice'),price:fv('price'),adj:fv('adj'),movein:fv('movein'),option:fv('option'),manager:fv('manager'),callDate:today,lastCall:fv('lastCall'),note:fv('note'),tradeBiz:fv('tradeBiz')};
  else if(mTab===2) obj={danji:fv('danji'),gubun:fv('gubun'),priority:fv('priority'),pyung:fv('pyung'),type:fv('type'),dong:fv('dong'),ho:fv('ho'),jeon:fv('jeon'),deposit:fv('deposit'),rent:fv('rent'),movein:fv('movein'),option:fv('option'),manager:fv('manager'),callDate:today,lastCall:fv('lastCall'),note:fv('note'),tradeBiz:fv('tradeBiz')};
  else {closeMModal();return;}
  if(isNew){
    obj._mno=genMaemulNo(mTab,obj.danji||'');
    data.unshift(obj);
    addMaemulLog('등록',mTab,obj,'');
  } else {
    const prev=data[mEditIdx]||{};
    obj._mno=prev._mno||genMaemulNo(mTab,obj.danji||'');
    Object.assign(data[mEditIdx],obj);
    addMaemulLog('수정',mTab,obj,'');
  }
  saveMaemulToFirebase();
  closeMModal(); renderMaemul();
}

  if(mEditIdx===null||mEditIdx<0) return;

async function saveAllMaemulToFirebase(){

    for(let t=0;t<3;t++){
      const col=t===0?'maemul_mp1':t===1?'maemul_mp2':'maemul_mp3';
      const arr=[window.MP1||[],window.MP2||[],window.MP3||[]][t];

}

async function loadMaemulFromFirebase(){
  if(!window._fbReady) return;
  try {
    for(let t=0;t<3;t++){
      const colName = t===0?'maemul_mp1': t===1?'maemul_mp2':'maemul_mp3';
      const result = await _FB.get(colName, 'all');
      if(result && result.json){
        const arr = JSON.parse(result.json);
        if(arr && arr.length>0){
          if(t===0){ window.MP1=arr; MP1=arr; }
          else if(t===1){ window.MP2=arr; MP2=arr; }
          else{ window.MP3=arr; MP3=arr; }
          console.log('매물 로드 완료 탭', t, ':', arr.length, '건');
        }
      }
    }
  } catch(e) { console.log('매물 Firebase 로드 오류:', e); }
}

function readExcel(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
    cb(wb);
  };
  reader.readAsArrayBuffer(file);
}

function fmtDate(v) {
  if(!v) return '';
  if(v instanceof Date) {
    const y=v.getFullYear(),m=String(v.getMonth()+1).zfill2(),d=String(v.getDate()).zfill2();
    return `${y}-${m}-${d}`;
  }
  const s=String(v).trim();
  const m=s.match(/(\d{4})[.\-](\d{1,2})[.\-](\d{1,2})/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return s;
}

function fmtMoney(v) {
  if(!v) return '';
  const n=parseFloat(String(v).replace(/[^\d.]/g,''));
  if(isNaN(n)||n===0) return String(v).replace(/[\r\n]/g,' ').trim();
  if(n>=100000000) return (n/100000000).toFixed(1)+'억';
  if(n>=10000) return Math.round(n/10000)+'만';
  return String(Math.round(n));
}

function fmtMoneyMan(v) {
  // 만원 단위 (실거래가)
  if(!v) return '';
  const n=parseFloat(String(v).replace(/[^\d.]/g,''));
  if(isNaN(n)||n===0) return '';
  if(n>=10000) return (n/10000).toFixed(1)+'억';
  return Math.round(n)+'만';
}

function escStr(v) {
  if(v===null||v===undefined) return '';
  return String(v).replace(/[\r\n]+/g,' ').trim();
}

String.prototype.zfill2 = function(){ return this.padStart(2,'0'); };

function cleanMgr(v) {
  if(!v) return '';
  const s=String(v).trim().replace(/[jJ]$/,'j');
  const map={'강':'강일임','강j':'강재미','대':'김민학','송':'송혜승','송j':'송혜승'};
  return map[s]||s;
}

      if(g==='1'||g==='1.0') {grade='1';}
      else if(g==='3'||g==='3.0') {grade='3';}
      else if(g.includes('타사')) {grade='2';status='타사완료';}
      else if(g.includes('완료')) {grade='1';status='완료';}
      else if(g.includes('보류')) {grade='3';status='보류';}

      const hists=[];
      for(let j=9;j<row.length-1;j+=2){
        const d=fmtDate(row[j]), c=escStr(row[j+1]);
        if(d&&c) hists.push({d,c});
      }
      newDB.push({
        id: uid++,
        date: fmtDate(row[0])||'2025-01-01',
        grade, status,
        name: escStr(row[2]),
        phone: escStr(row[3]),
        gubun: escStr(row[4]),
        type: escStr(row[5])||'아파트',
        note: escStr(row[6]),
        lastCall: fmtDate(row[7]),
        manager: cleanMgr(row[8]),
        history: hists
      });
    });
    if(!newDB.length) { alert('데이터를 찾을 수 없습니다.'); return; }
    if(!confirm(`${newDB.length}건을 불러옵니다. 기존 데이터를 교체할까요?`)) return;
    DB = newDB;
    saveDB();
    buildHeader(); render();
    // Firebase에도 저장
    alert(`✅ ${newDB.length}건 반영 완료! Firebase에 저장 중...`);
    (async () => {
      await saveAllDB();
      alert(`✅ Firebase 저장 완료! (${DB.length}건)`);
    })();
  });
  input.value='';
}

function initJournal() {
  // sessionStorage에서 복원
  try {
    const s = sessionStorage.getItem('journal');
    if (s) { JDB = JSON.parse(s); return; }
  } catch(e) {}
  // seed 데이터 로드
  let uid = 1;
  for (const [mgr, entries] of Object.entries(JOURNAL_SEED)) {
    for (const e of entries) {
      JDB.push({id: uid++, date: e.date, manager: mgr, content: e.content, done: e.done});
    }
  }
  // seed 데이터는 sessionStorage만 저장 (Firebase X)
  try { sessionStorage.setItem('journal', JSON.stringify(JDB)); } catch(e) {}
}

function renderJournal() {
  const mgrF = document.getElementById('jMgrFilter').value;
  const monthF = document.getElementById('jMonthFilter').value;
  const dateF = document.getElementById('jDateFilter').value;
  const q = (document.getElementById('jSearch').value || '').toLowerCase();
  const doneOnly = document.getElementById('jShowDone').checked;

  // 권한: 담당자는 본인+공통만
  let rows = JDB.filter(r => {
    if (currentUser && currentUser.manager !== 'ALL') {
      if (r.manager !== currentUser.manager && r.manager !== '공통') return false;
    }
    if (mgrF !== 'all' && r.manager !== mgrF) return false;
    if (dateF && r.date !== dateF) return false;
    if (!dateF && monthF && r.date) {
      const isRealDate = /^\d{4}-\d{2}/.test(r.date);
      if (isRealDate && !r.date.startsWith(monthF)) return false;
    }
    if (q && !r.content.toLowerCase().includes(q)) return false;
    if (doneOnly && !r.done) return false;
    return true;
  });

  // 날짜 내림차순
  rows.sort((a,b) => (b.date||'').localeCompare(a.date||''));

  document.getElementById('jCount').textContent = `총 ${rows.length}건`;
  const tbody = document.getElementById('jTbody');
  const empty = document.getElementById('jEmpty');

  if (!rows.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // 날짜별 그룹핑
  let lastDate = '';
  tbody.innerHTML = rows.map(r => {
    const isNew = r.date && r.date !== lastDate;
    if (r.date) lastDate = r.date;
    const dateCell = isNew ? `<span style="font-weight:700;color:#ff6b2b">${r.date||''}</span>` : '';
    const doneStyle = r.done ? 'text-decoration:line-through;color:#9ca3af;' : '';
    const chk = r.done ? '✅' : '⬜';
    const mgrBadge = `<span style="background:#f0f2f7;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;color:#6b7280">${r.manager}</span>`;
    const isMyJournal = !currentUser || currentUser.manager==='ALL' || currentUser.manager===r.manager;
    return `<tr style="border-bottom:1px solid #f0f2f7;" onmouseover="this.style.background='#fafafa'" onmouseout="this.style.background=''">
      <td style="text-align:center;cursor:pointer;font-size:16px;" onclick="${isMyJournal?`toggleJDone(${r.id})`:'void(0)'}">${chk}</td>
      <td style="padding:9px 14px;white-space:nowrap;color:#6b7280;font-size:11px;text-align:center;">${dateCell}</td>
      <td style="padding:9px 8px;text-align:center;">${mgrBadge}</td>
      <td style="padding:9px 14px;${doneStyle}line-height:1.6;text-align:center;">${esc(r.content)}</td>
      <td style="text-align:center;">${isMyJournal ? `<button onclick="delJournal(${r.id})" class="btn btn-danger btn-sm" style="font-size:10px;padding:3px 7px;">삭제</button> <button onclick="openEditJournal(${r.id})" class="btn btn-ghost btn-sm" style="font-size:10px;padding:3px 7px;">수정</button>` : `<span style="font-size:10px;color:#9ca3af;">-</span>`}</td>
    </tr>`;
  }).join('');
}

// ── 업무일지 엑셀 업로드 ──
function uploadJournal(input) {
  if(!input.files[0]) return;
  readExcel(input.files[0], wb => {
    const MGR_MAP = {
      '공통':'공통','강일임':'강일임','강재미':'강재미','김민학':'김민학',
      '송혜승':'송혜승','송예경':'송예경','김은미':'김은미','송재희':'송재희','김희중':'김희중'
    };
    let parsed = [];
    let maxId = JDB.length ? Math.max(...JDB.map(x=>x.id||0)) : 0;

    // 시트명이 담당자명과 일치하면 그 담당자로, 아니면 내용에서 파악
    wb.SheetNames.forEach(sheetName => {
      const ws = wb.Sheets[sheetName];
      if(!ws) return;
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:''});
      
      // 헤더 행 찾기 (날짜 컬럼 있는 행)
      let headerIdx = -1;
      rows.forEach((r,i) => { if(r[1]==='날짜'||r[1]==='date') headerIdx=i; });
      if(headerIdx===-1) return;

      const manager = MGR_MAP[sheetName] || sheetName;
      let lastDate = '';

      rows.slice(headerIdx+1).forEach(r => {
        const content = String(r[2]||'').trim();
        if(!content) return;

        // 날짜 처리
        let dateStr = '';
        const dateVal = r[1];
        if(dateVal && String(dateVal).trim()) {
          const s = String(dateVal).trim();
          // 엑셀 숫자 날짜
          if(/^\d{5}$/.test(s)) {
            const d = new Date(Date.UTC(1899,11,30) + parseInt(s)*86400000);
            dateStr = d.toISOString().split('T')[0];
          } else if(/^\d{4}-\d{2}-\d{2}/.test(s)) {
            dateStr = s.substring(0,10);
          } else if(/^\d{4}\/\d{2}\/\d{2}/.test(s)) {
            dateStr = s.replace(/\//g,'-').substring(0,10);
          }
          if(dateStr) lastDate = dateStr;
        }
        if(!dateStr) dateStr = lastDate;

        const done = String(r[0]||'').toUpperCase()==='TRUE' || r[0]===true || String(r[0])=='Y';
        parsed.push({id:++maxId, date:dateStr, manager, content:esc(content), done});
      });
    });

    if(!parsed.length) { alert('데이터를 찾을 수 없습니다.'); input.value=''; return; }
    if(!confirm(`${parsed.length}건을 업무일지에 추가할까요?\n(기존 데이터는 유지됩니다)`)) { input.value=''; return; }

    JDB.push(...parsed);
    saveJournal_db();
    renderJournal();
    alert(`✅ ${parsed.length}건 업무일지에 추가 완료!`);
    input.value='';
  });
}

async function saveJournal() {
  const date = document.getElementById('jDate').value;
  const mgr = document.getElementById('jMgr').value;
  const content = document.getElementById('jContent').value.trim();
  const done = document.getElementById('jDone').checked;
  if (!content) { alert('업무 내용을 입력하세요.'); return; }

  if (window._jEditId != null) {
    // 수정 모드
    const r = JDB.find(x => x.id === window._jEditId);
    if (r) {
      r.date = date;
      r.manager = mgr;
      r.content = esc(content);
      r.done = done;
      await saveJournal_db([window._jEditId]);
    }
  } else {
    // 추가 모드
    const newId = JDB.length ? Math.max(...JDB.map(x=>x.id)) + 1 : 1;
    const newEntry = {id: newId, date, manager: mgr, content: esc(content), done};
    JDB.push(newEntry);
    await saveJournal_db([newId]);
  }
  closeJModal();
  renderJournal();
}

// ── FIREBASE LOAD ──
async function loadFromFirebase() {
  try {
    // 고객 데이터 로드 (전체 저장 방식)
    await loadAllDB();
    if(DB.length === 0) {
      // 기존 개별 저장 데이터 마이그레이션 시도
      const customers = await _FB.getAll('customers');
      if(customers && customers.length > 0) {
        DB = customers; window.DB = customers;
        DB.sort((a,b) => (b.id||0) - (a.id||0));
        await saveAllDB(); // 전체 저장 방식으로 마이그레이션
      } else {
        seed();
      }
    }
    window._fbLoaded = true;

    // 업무일지 로드 (전체 저장 방식)
    await loadAllJDB();
    if(JDB.length === 0) {
      const journals = await _FB.getAll('journal');
      if(journals && journals.length > 0) {
        JDB = journals; window.JDB = journals;
        await saveAllJDB();
      } else {
        initJournal();
      }
    }

    // 매물 데이터 Firebase에서 로드
    await loadMaemulFromFirebase();
    await loadMaemulLog();
    // 기존 매물에 매물번호 없으면 자동 부여
    let _migrated=false;
    [[window.MP1||[],0],[window.MP2||[],1],[window.MP3||[],2]].forEach(([arr,t])=>{
      arr.forEach(r=>{ if(!r._mno){ r._mno=genMaemulNo(t,r.danji||''); _migrated=true; } });
    });
    if(_migrated) saveAllMaemulToFirebase();

    buildHeader(); render();
    if(JDB.length === 0) initJournal();
    // 초기 탭: 매물장
    switchTab('maemul');

    // 30초마다 현재 탭 데이터 새로고침
    setInterval(async () => {
      try {
        await loadAllDB();
        if(currentTab==='crm'){buildHeader();render();}
        await loadAllJDB();
        if(currentTab==='journal') renderJournal();
        await loadMaemulFromFirebase();
        if(currentTab==='maemul') renderMaemul();
      } catch(e){ console.log('폴링 오류:', e); }
    }, 10000);

  } catch(e) {
    console.log('Firebase 오류, 로컬 데이터 사용:', e);
    seed(); buildHeader(); render(); initJournal();
  }
}

// Firebase 저장 (단일 레코드)
async function fbSave(colName, id, data) {
  if(!window._fbReady) return;
  await _FB.set(colName, String(id), data);
}

async function fbDelete(colName, id) {
  if(!window._fbReady) return;
  await _FB.del(colName, String(id));
}

// 전체 DB를 하나의 문서로 저장 (매물장 방식)
async function saveAllDB() {
  if(!window._fbReady) return;
  try {
    await _FB.set('crm_data', 'customers', {json: JSON.stringify(DB)});
    console.log('고객 저장 완료:', DB.length, '건');

async function saveAllJDB() {
  if(!window._fbReady) return;

    await _FB.set('crm_data', 'journal', {json: JSON.stringify(JDB)});
    console.log('업무일지 저장 완료:', JDB.length, '건');
  } catch(e) { console.log('업무일지 저장 오류:', e); }

async function loadAllDB() {

    }

}

async function loadAllJDB() {
  if(!window._fbReady) return;

    const r = await _FB.get('crm_data', 'journal');
    if(r && r.json) {

// ── INIT ──
function init() {
  // 세션에서 로그인 정보 복원
  const saved = sessionStorage.getItem('crmUser');
  if (saved) {
    const key = saved;
    if (ACCOUNTS[key]) {
      currentUser = ACCOUNTS[key];
      showApp();
      return;
    }
  }
  showLogin();
}

function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('userBadge').textContent = currentUser.name + ' 님';
  // 버튼 표시는 switchTab('crm')에서 통합 처리하므로 여기선 초기 숨김만
  // 버튼 초기화 - switchTab에서 통합 관리
  ['excelBtn','dedupeBtn','uploadBtn',
   'maemulAddBtn','maemulLogBtn','maemulExcelBtn','maemulDedupeBtn','maemulUploadBtn',
   'journalAddBtn','journalExcelBtn','journalDedupeBtn','journalUploadBtn',
   'addClientBtn','blindBtn'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  // 담당자이면 신규 등록 폼에서 본인 담당 자동 설정
  if (currentUser.manager !== 'ALL') {
    const sel = document.getElementById('f_manager');
    if (sel) sel.value = currentUser.manager;
  }
  // 항상 Firebase에서 최신 데이터 로드 (세션스토리지 무시)
  sessionStorage.removeItem('crm2');
  sessionStorage.removeItem('journal');
  if(window._fbReady) {
    loadFromFirebase();
  } else {
    document.addEventListener('fbReady', loadFromFirebase, {once:true});
    setTimeout(()=>{
      if(!window._fbLoaded){ seed(); buildHeader(); render(); initJournal(); }
    }, 3000);
  }
}

function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const acc = ACCOUNTS[id];
  if (!acc || acc.pw !== pw) {
    document.getElementById('loginErr').textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
    return;
  }
  currentUser = acc;
  sessionStorage.setItem('crmUser', id);
  showApp();
}

function doLogout() {
  currentUser = null;
  sessionStorage.removeItem('crmUser');
  showLogin();
}

document.addEventListener('keydown', e => {
  if (document.getElementById('loginScreen').style.display !== 'none' && e.key === 'Enter') doLogin();
});

init();
</script>
